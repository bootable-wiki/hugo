name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Inject download link
        run: |
          sed -i 's|^## What is BWBundle?|## Downloads\n\nDownload the latest version from [BunnyCDN](/bwbundle.zip). Older versions are available on [GitHub](https://github.com/bootable-wiki/bwbundle/releases).\n\n## What is BWBundle?|' content/BWBundle.md

      - name: Build
        run: hugo --minify

      - name: Sync to BunnyCDN
        env:
          BUNNY_SZ_KEY: ${{ secrets.BUNNY_SZ_KEY }}
        run: |
          cd public
          find . -type f | while read file; do
            dest="${file#./}"
            curl -s -o /dev/null -w "%{http_code}" -X PUT \
              "https://storage.bunnycdn.com/bootable-wiki/$dest" \
              -H "AccessKey: $BUNNY_SZ_KEY" \
              --data-binary "@$file"
          done

      - name: Purge Bunny CDN cache
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          curl -s -o /dev/null -X POST \
            "https://api.bunny.net/pullzone/6026270/purgeCache" \
            -H "AccessKey: $BUNNY_API_KEY"

      - name: Revert download link for GitHub Pages
        run: |
          sed -i 's|Download the latest version from.*GitHub</a>\.|Download the latest release from <a href="https://github.com/bootable-wiki/bwbundle/releases">GitHub</a>.|' public/bwbundle/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
