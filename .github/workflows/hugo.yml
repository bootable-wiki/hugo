name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Inject download link
        run: |
          sed -i 's|^## What is BWBundle?|## Downloads\n\nDownload the latest release from [GitHub](https://github.com/bootable-wiki/bwbundle/releases).\n\n## What is BWBundle?|' content/BWBundle.md

      - name: Build
        run: hugo --minify

      - name: Minify CSS
        run: |
          sed -i '/^[[:space:]]*$/d' public/style.css
          sed -i 's/^[[:space:]]*//; s/[[:space:]]*$//' public/style.css
          tr -d '\n' < public/style.css > tmp && mv tmp public/style.css

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
