name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Inject download link
        run: |
          sed -i 's|^## What is BWBundle?|## Downloads\n\nDownload the latest version from [BunnyCDN](https://bootable-wiki.b-cdn.net/bwbundle.zip). Older versions are available on [GitHub](https://github.com/bootable-wiki/bwbundle/releases).\n\n## What is BWBundle?|' content/BWBundle.md

      - name: Build
        run: hugo --minify

      - name: Minify CSS
        run: |
          sed -i '/^[[:space:]]*$/d' public/style.css
          sed -i 's/^[[:space:]]*//; s/[[:space:]]*$//' public/style.css
          tr -d '\n' < public/style.css > tmp && mv tmp public/style.css

      - name: Install rclone
        run: |
          curl -sL https://downloads.rclone.org/rclone-current-linux-amd64.zip -o rclone.zip
          unzip -q rclone.zip
          sudo cp rclone-*-linux-amd64/rclone /usr/local/bin
          rm -rf rclone.zip rclone-*-linux-amd64

      - name: Sync to BunnyCDN
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
        run: |
          rclone config create bunny bunnystorage \
            storage_zone=bootable-wiki \
            api_key=$BUNNY_API_KEY \
            region=de \
            --non-interactive 2>/dev/null || true
          rclone sync public bunny:bootable-wiki \
            --progress --bwlimit 50M

      - name: Revert download link for GitHub Pages
        run: |
          sed -i 's|Download the latest version from.*GitHub</a>\.|Download the latest release from <a href="https://github.com/bootable-wiki/bwbundle/releases">GitHub</a>.|' public/bwbundle/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
